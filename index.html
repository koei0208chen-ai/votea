<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校園作品投票系統 - 自動比對檔案版</title>
    <!-- 載入外部支援庫 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; margin: 0; padding: 0; }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        .animate-zoom-in { animation: zoomIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes zoomIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // ==========================================
        // --- 核心設定區 (請在此修改您的 Google 表單資訊) ---
        // ==========================================
        const CONFIG = {
            GOOGLE_FORM_URL: "https://docs.google.com/forms/d/e/1FAIpQLSdb_aKdwWAbqhnIhuXcCNAyEHLD7l4c64ijtdbsU_WTpTK-MA/viewform",
            ENTRY_ID_CLASS: "entry.1175858521",
            ENTRY_ID_WORKS: "entry.919973616",
            GOOGLE_RESULTS_URL: "https://docs.google.com/spreadsheets/d/e/2PACX-1vRALAaqHfaWW0Xi_slzQwVn4hQxMR5D1SiK6TlgetT3iGbN6bzxElACcfUCsZpDjpmC_Inqs7Z0qs2l/pubhtml?widget=true&amp;headers=false"
        };

        // 安全的內嵌圖示組件
        const Icon = ({ name, className = "w-6 h-6" }) => {
            const icons = {
                image: <path d="M21 19V5a2 2 0 00-2-2H5a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2zM3 16l5-5 3 3 5-5 5 5" />,
                plus: <path d="M12 5v14M5 12h14" />,
                check: <path d="M20 6L9 17l-5-5" />,
                lock: <path d="M19 11H5a2 2 0 00-2 2v7a2 2 0 002 2h14a2 2 0 002-2v-7a2 2 0 00-2-2zM7 11V7a5 5 0 0110 0v4" />,
                "zoom-in": <g fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></g>,
                x: <path d="M18 6L6 18M6 6l12 12" />
            };

            return (
                <svg 
                    viewBox="0 0 24 24" 
                    fill="none" 
                    stroke="currentColor" 
                    strokeWidth="2" 
                    strokeLinecap="round" 
                    strokeLinejoin="round" 
                    className={className}
                >
                    {icons[name] || null}
                </svg>
            );
        };

        // 自動生成 701-709 班級基礎清單 (最大 28 件)
        const generateClassData = () => {
            const data = {};
            const alphabet = "abcdefghijklmnopqrstuvwxyz".split("");
            const getName = (i) => i < 26 ? alphabet[i].toUpperCase() : ("A" + alphabet[i-26]).toUpperCase();
            const getFile = (i) => i < 26 ? alphabet[i] : "a" + alphabet[i-26];

            for (let c = 701; c <= 709; c++) {
                const cls = c.toString();
                data[cls] = {
                    password: `p${cls}`,
                    images: Array.from({ length: 28 }, (_, i) => ({
                        id: `${cls}-${i + 1}`,
                        name: getName(i),
                        filenameBase: getFile(i),
                        description: `${cls} 班級作品 ${getName(i)}`
                    }))
                };
            }
            return data;
        };

        const CLASS_DATA = generateClassData();

        function App() {
            const [activeTab, setActiveTab] = useState('vote');
            const [userClass, setUserClass] = useState("");
            const [passwordInput, setPasswordInput] = useState("");
            const [isVerified, setIsVerified] = useState(false);
            const [selectedWorks, setSelectedWorks] = useState([]);
            const [hasVoted, setHasVoted] = useState(false);
            const [missingImages, setMissingImages] = useState(new Set()); // 儲存不存在的圖片 ID
            const [selectedImg, setSelectedImg] = useState(null);

            useEffect(() => {
                const voted = localStorage.getItem('hasVotedImageVote');
                if (voted) setHasVoted(true);
            }, []);

            // 當班級改變時，重置所有狀態
            useEffect(() => {
                setIsVerified(false);
                setPasswordInput("");
                setSelectedWorks([]);
                setMissingImages(new Set());
            }, [userClass]);

            const handleVerify = () => {
                if (userClass && CLASS_DATA[userClass] && passwordInput === CLASS_DATA[userClass].password) {
                    setIsVerified(true);
                } else {
                    alert("驗證失敗：密碼不正確！");
                }
            };

            const toggleWork = (e, name) => {
                e.stopPropagation();
                if (selectedWorks.includes(name)) {
                    setSelectedWorks(selectedWorks.filter(w => w !== name));
                } else if (selectedWorks.length < 2) {
                    setSelectedWorks([...selectedWorks, name]);
                } else {
                    setSelectedWorks([selectedWorks[1], name]);
                }
            };

            const submitVote = () => {
                let url = `${CONFIG.GOOGLE_FORM_URL}?usp=pp_url&${CONFIG.ENTRY_ID_CLASS}=${encodeURIComponent(userClass)}`;
                selectedWorks.forEach(w => url += `&${CONFIG.ENTRY_ID_WORKS}=${encodeURIComponent(w)}`);
                localStorage.setItem('hasVotedImageVote', 'true');
                setHasVoted(true);
                window.open(url, '_blank');
            };

            // 核心邏輯：如果所有格式都讀取失敗，將 ID 加入缺失清單，React 會自動隱藏該框架
            const onImgError = (e, imgId) => {
                const currentSrc = e.target.src;
                if (currentSrc.toLowerCase().endsWith('.png')) {
                    e.target.src = currentSrc.replace('.png', '.jpg');
                } else if (currentSrc.toLowerCase().endsWith('.jpg')) {
                    e.target.src = currentSrc.replace('.jpg', '.jpeg');
                } else {
                    // 該檔案在伺服器上確實不存在
                    setMissingImages(prev => {
                        const newSet = new Set(prev);
                        newSet.add(imgId);
                        return newSet;
                    });
                }
            };

            // 過濾掉不存在的圖片，只顯示 images 資料夾內有的檔案
            const currentImages = useMemo(() => {
                if (!isVerified || !userClass || !CLASS_DATA[userClass]) return [];
                return CLASS_DATA[userClass].images.filter(img => !missingImages.has(img.id));
            }, [isVerified, userClass, missingImages]);

            return (
                <div className="min-h-screen flex flex-col">
                    {/* Header */}
                    <header className="bg-white border-b p-4 sticky top-0 z-30 flex justify-between items-center shadow-sm">
                        <div className="flex items-center gap-2 text-indigo-600">
                            <Icon name="image" className="w-6 h-6 stroke-[3px]" />
                            <span className="font-black text-xl tracking-tight hidden sm:inline text-slate-800">校園作品投票系統</span>
                        </div>
                        <nav className="flex bg-slate-100 p-1 rounded-xl">
                            <button onClick={() => setActiveTab('vote')} className={`px-6 py-2 rounded-lg text-sm font-bold transition-all ${activeTab === 'vote' ? 'bg-white shadow text-indigo-600' : 'text-slate-500'}`}>投票介面</button>
                            <button onClick={() => setActiveTab('results')} className={`px-6 py-2 rounded-lg text-sm font-bold transition-all ${activeTab === 'results' ? 'bg-white shadow text-indigo-600' : 'text-slate-500'}`}>即時結果</button>
                        </nav>
                    </header>

                    <main className="max-w-6xl mx-auto w-full p-6 flex-1">
                        {activeTab === 'vote' ? (
                            <div className="space-y-8 animate-fade-in">
                                {/* 第一步：選擇班級與密碼 */}
                                <section className="bg-white p-6 sm:p-8 rounded-[2rem] border shadow-sm grid grid-cols-1 md:grid-cols-3 gap-8">
                                    <div className="space-y-2">
                                        <label className="text-[10px] font-black uppercase text-slate-400 tracking-widest pl-1">1. 選擇班級</label>
                                        <select value={userClass} onChange={e => setUserClass(e.target.value)} className="w-full border-2 border-slate-100 p-4 rounded-2xl bg-slate-50 font-bold outline-none focus:border-indigo-500 transition-all cursor-pointer">
                                            <option value="">請點選班級...</option>
                                            {Object.keys(CLASS_DATA).map(c => <option key={c} value={c}>{c} 班</option>)}
                                        </select>
                                    </div>
                                    <div className={`space-y-2 ${!userClass ? 'opacity-20 pointer-events-none' : 'opacity-100'}`}>
                                        <label className="text-[10px] font-black uppercase text-slate-400 tracking-widest pl-1">2. 班級密碼</label>
                                        <div className="flex gap-2">
                                            <input type="password" value={passwordInput} onChange={e => setPasswordInput(e.target.value)} onKeyPress={e => e.key === 'Enter' && handleVerify()} className="flex-1 border-2 border-slate-100 p-4 rounded-2xl bg-slate-50 outline-none focus:border-indigo-500 transition-all font-bold" disabled={isVerified} />
                                            {!isVerified && <button onClick={handleVerify} className="bg-slate-900 text-white px-6 rounded-2xl font-bold hover:bg-black transition-all">解鎖</button>}
                                        </div>
                                    </div>
                                    <div className="flex flex-col justify-end">
                                        {hasVoted ? (
                                            <div className="bg-emerald-50 text-emerald-600 h-[64px] flex items-center justify-center rounded-2xl font-black border-2 border-emerald-100 italic tracking-wider">已完成投票紀錄</div>
                                        ) : (
                                            <button onClick={submitVote} disabled={!isVerified || selectedWorks.length === 0} className="bg-indigo-600 text-white h-[64px] rounded-2xl font-black shadow-lg shadow-indigo-100 disabled:bg-slate-100 disabled:text-slate-300 disabled:shadow-none transition-all hover:bg-indigo-700 active:scale-95">確認送出選票 ({selectedWorks.length}/2)</button>
                                        )}
                                    </div>
                                </section>

                                {/* 第二步：作品呈現 (僅顯示存在的檔案) */}
                                {isVerified ? (
                                    <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-6 pb-20 animate-fade-in">
                                        {currentImages.map(img => {
                                            const isSelected = selectedWorks.includes(img.name);
                                            return (
                                                <div key={img.id} className={`group bg-white rounded-[1.5rem] border-2 transition-all duration-300 overflow-hidden relative ${isSelected ? 'border-indigo-600 ring-8 ring-indigo-50 shadow-2xl scale-[1.03]' : 'border-slate-100 shadow-sm hover:shadow-md'}`}>
                                                    <div 
                                                        className="aspect-[4/3] relative bg-slate-200 overflow-hidden cursor-zoom-in"
                                                        onClick={() => setSelectedImg(img)}
                                                    >
                                                        <img 
                                                            src={`./images/${userClass}/${img.filenameBase}.png`} 
                                                            className="w-full h-full object-cover transition-transform duration-1000 group-hover:scale-110" 
                                                            onError={e => onImgError(e, img.id)} 
                                                        />
                                                        {/* 放大提示 */}
                                                        <div className="absolute inset-0 bg-black/0 group-hover:bg-black/20 transition-colors flex items-center justify-center pointer-events-none">
                                                            <Icon name="zoom-in" className="text-white opacity-0 group-hover:opacity-100 transition-opacity w-10 h-10" />
                                                        </div>
                                                        {/* 選取按鈕 */}
                                                        <button 
                                                            onClick={(e) => toggleWork(e, img.name)} 
                                                            className={`absolute top-3 right-3 w-10 h-10 rounded-xl flex items-center justify-center shadow-lg transition-all transform z-10 ${isSelected ? 'bg-indigo-600 text-white' : 'bg-white/90 text-slate-300 hover:text-indigo-600'}`}
                                                        >
                                                            {isSelected ? <Icon name="check" className="w-6 h-6" /> : <Icon name="plus" className="w-5 h-5" />}
                                                        </button>
                                                    </div>
                                                    <div className="p-4 flex justify-between items-center">
                                                        <div>
                                                            <h3 className="font-black text-slate-800">作品 {img.name}</h3>
                                                            <p className="text-[10px] text-slate-400 font-mono tracking-tighter">{img.id}</p>
                                                        </div>
                                                        <button onClick={(e) => toggleWork(e, img.name)} className={`text-xs font-black px-4 py-2 rounded-xl transition-colors ${isSelected ? 'text-red-500 bg-red-50' : 'text-indigo-600 bg-indigo-50 hover:bg-indigo-100'}`}>
                                                            {isSelected ? '取消' : '選取'}
                                                        </button>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                        {/* 如果該班級沒有任何圖片 */}
                                        {currentImages.length === 0 && (
                                            <div className="col-span-full py-20 text-center text-slate-400">
                                                正在檢查圖片檔案或該班級尚未上傳作品...
                                            </div>
                                        )}
                                    </div>
                                ) : (
                                    <div className="py-32 text-center bg-white rounded-[3rem] border-2 border-dashed border-slate-200">
                                        <Icon name="lock" className="w-12 h-12 text-slate-100 mx-auto mb-4" />
                                        <h3 className="text-xl font-bold text-slate-300 tracking-[0.3em] uppercase">請先輸入班級密碼解鎖作品</h3>
                                    </div>
                                )}
                            </div>
                        ) : (
                            /* 結果頁面 */
                            <div className="bg-white rounded-[2rem] shadow-sm border h-[75vh] overflow-hidden relative animate-fade-in">
                                <iframe src={CONFIG.GOOGLE_RESULTS_URL} className="w-full h-full border-0">載入中...</iframe>
                            </div>
                        )}
                    </main>

                    {/* Lightbox 圖片放大 */}
                    {selectedImg && (
                        <div 
                            className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-950/90 backdrop-blur-sm animate-fade-in" 
                            onClick={() => setSelectedImg(null)}
                        >
                            <button 
                                className="absolute top-6 right-6 text-white/50 hover:text-white p-2 rounded-full hover:bg-white/10 transition-colors"
                                onClick={() => setSelectedImg(null)}
                            >
                                <Icon name="x" className="w-10 h-10" />
                            </button>
                            
                            <div className="max-w-5xl w-full flex flex-col items-center animate-zoom-in" onClick={(e) => e.stopPropagation()}>
                                <div className="relative group">
                                    <img 
                                        src={`./images/${userClass}/${selectedImg.filenameBase}.png`} 
                                        className="max-h-[80vh] max-w-full rounded-2xl shadow-2xl border border-white/10" 
                                        onError={e => {
                                            const s = e.target.src;
                                            if (s.endsWith('.png')) e.target.src = s.replace('.png', '.jpg');
                                            else if (s.endsWith('.jpg')) e.target.src = s.replace('.jpg', '.jpeg');
                                        }}
                                    />
                                    <div className="mt-4 text-center">
                                        <h3 className="text-white text-2xl font-black mb-1">{selectedImg.name}</h3>
                                        <p className="text-white/50 text-sm">點擊背景或右上角按鈕關閉預覽</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    <footer className="p-8 text-center text-slate-300 text-[10px] font-black uppercase tracking-[0.5em]">
                        &copy; 2026 Campus Voting System &bull; Interactive POC
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
