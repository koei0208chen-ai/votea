<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校園海報作品投票系統</title>
    <!-- 載入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 載入 React & Babel (讓瀏覽器能跑 React) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- 載入 Lucide 圖示 -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- 設定區 ---
        const CONFIG = {
            GOOGLE_FORM_URL: "https://docs.google.com/forms/d/e/你的表單ID/viewform",
            ENTRY_ID_CLASS: "entry.111111111",
            ENTRY_ID_WORKS: "entry.222222222",
            GOOGLE_RESULTS_URL: "https://docs.google.com/spreadsheets/d/e/你的發佈ID/pubhtml?widget=true&headers=false"
        };

        const generateClassData = () => {
            const data = {};
            const alphabet = "abcdefghijklmnopqrstuvwxyz".split("");
            const getName = (i) => i < 26 ? alphabet[i].toUpperCase() : ("A" + alphabet[i-26]).toUpperCase();
            const getFile = (i) => i < 26 ? alphabet[i] : "a" + alphabet[i-26];

            for (let c = 701; c <= 709; c++) {
                const cls = c.toString();
                data[cls] = {
                    password: `p${cls}`,
                    images: Array.from({ length: 28 }, (_, i) => ({
                        id: `${cls}-${i + 1}`,
                        name: getName(i),
                        filenameBase: getFile(i),
                        description: `${cls} 班級作品 ${getName(i)}`
                    }))
                };
            }
            return data;
        };

        const classData = generateClassData();

        function App() {
            const [activeTab, setActiveTab] = useState('vote');
            const [userClass, setUserClass] = useState("");
            const [passwordInput, setPasswordInput] = useState("");
            const [isVerified, setIsVerified] = useState(false);
            const [selectedWorks, setSelectedWorks] = useState([]);
            const [hasVoted, setHasVoted] = useState(false);
            const [selectedImg, setSelectedImg] = useState(null);

            useEffect(() => {
                const voted = localStorage.getItem('hasVotedImageVote');
                if (voted) setHasVoted(true);
            }, []);

            useEffect(() => {
                setIsVerified(false);
                setPasswordInput("");
                setSelectedWorks([]);
            }, [userClass]);

            const handleVerify = () => {
                if (userClass && classData[userClass].password === passwordInput) {
                    setIsVerified(true);
                } else {
                    alert("密碼錯誤！");
                }
            };

            const toggleWork = (name) => {
                if (selectedWorks.includes(name)) {
                    setSelectedWorks(selectedWorks.filter(w => w !== name));
                } else if (selectedWorks.length < 2) {
                    setSelectedWorks([...selectedWorks, name]);
                } else {
                    setSelectedWorks([selectedWorks[1], name]);
                }
            };

            const submitVote = () => {
                let url = `${CONFIG.GOOGLE_FORM_URL}?usp=pp_url&${CONFIG.ENTRY_ID_CLASS}=${encodeURIComponent(userClass)}`;
                selectedWorks.forEach(w => url += `&${CONFIG.ENTRY_ID_WORKS}=${encodeURIComponent(w)}`);
                localStorage.setItem('hasVotedImageVote', 'true');
                setHasVoted(true);
                window.open(url, '_blank');
            };

            // 圖片修復邏輯
            const onImgError = (e, name) => {
                if (e.target.src.endsWith('.png')) {
                    e.target.src = e.target.src.replace('.png', '.jpg');
                } else {
                    e.target.src = `https://via.placeholder.com/400x300?text=${name}`;
                }
            };

            return (
                <div className="min-h-screen flex flex-col">
                    <header className="bg-white border-b p-4 sticky top-0 z-20 flex justify-between items-center shadow-sm">
                        <div className="flex items-center gap-2">
                            <div className="bg-blue-600 p-1.5 rounded-lg text-white">
                                <i data-lucide="thumbs-up"></i>
                            </div>
                            <span className="font-bold text-lg">作品投票系統</span>
                        </div>
                        <nav className="flex bg-slate-100 p-1 rounded-lg">
                            <button onClick={() => setActiveTab('vote')} className={`px-4 py-1.5 rounded-md text-sm font-bold ${activeTab === 'vote' ? 'bg-white shadow text-blue-600' : 'text-slate-500'}`}>投票</button>
                            <button onClick={() => setActiveTab('results')} className={`px-4 py-1.5 rounded-md text-sm font-bold ${activeTab === 'results' ? 'bg-white shadow text-blue-600' : 'text-slate-500'}`}>結果</button>
                        </nav>
                    </header>

                    <main className="max-w-6xl mx-auto w-full p-4 flex-1">
                        {activeTab === 'vote' ? (
                            <div className="space-y-6">
                                <section className="bg-white p-6 rounded-2xl border shadow-sm grid grid-cols-1 md:grid-cols-3 gap-6">
                                    <div>
                                        <label className="block text-sm font-bold mb-2">1. 選擇班級</label>
                                        <select value={userClass} onChange={e => setUserClass(e.target.value)} className="w-full border p-3 rounded-xl bg-slate-50 font-bold outline-none">
                                            <option value="">請選擇...</option>
                                            {Object.keys(classData).map(c => <option key={c} value={c}>{c} 班</option>)}
                                        </select>
                                    </div>
                                    <div className={!userClass ? 'opacity-30 pointer-events-none' : ''}>
                                        <label className="block text-sm font-bold mb-2">2. 班級密碼</label>
                                        <div className="flex gap-2">
                                            <input type="password" value={passwordInput} onChange={e => setPasswordInput(e.target.value)} placeholder="輸入密碼" className="flex-1 border p-3 rounded-xl bg-slate-50 outline-none" disabled={isVerified} />
                                            {!isVerified && <button onClick={handleVerify} className="bg-slate-800 text-white px-4 rounded-xl font-bold">驗證</button>}
                                        </div>
                                    </div>
                                    <div className="flex flex-col justify-end">
                                        {hasVoted ? (
                                            <div className="bg-emerald-50 text-emerald-600 h-12 flex items-center justify-center rounded-xl font-bold border border-emerald-100">已完成投票</div>
                                        ) : (
                                            <button onClick={submitVote} disabled={!isVerified || selectedWorks.length === 0} className="bg-blue-600 text-white h-12 rounded-xl font-bold disabled:bg-slate-100 disabled:text-slate-300">送出選票 ({selectedWorks.length}/2)</button>
                                        )}
                                    </div>
                                </section>

                                {isVerified ? (
                                    <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 pb-10">
                                        {classData[userClass].images.map(img => {
                                            const isSelected = selectedWorks.includes(img.name);
                                            return (
                                                <div key={img.id} className={`bg-white rounded-2xl border-2 transition-all overflow-hidden ${isSelected ? 'border-blue-600 shadow-lg scale-[1.02]' : 'border-transparent shadow-sm'}`}>
                                                    <div className="aspect-[4/3] relative">
                                                        <img src={`./images/${userClass}/${img.filenameBase}.png`} className="w-full h-full object-cover" onError={e => onImgError(e, img.name)} />
                                                        <button onClick={() => toggleWork(img.name)} className={`absolute top-2 right-2 w-8 h-8 rounded-full flex items-center justify-center shadow-lg ${isSelected ? 'bg-blue-600 text-white' : 'bg-white/90 text-slate-300'}`}>
                                                            {isSelected ? '✓' : ''}
                                                        </button>
                                                    </div>
                                                    <div className="p-3 text-center">
                                                        <h3 className="font-bold">作品 {img.name}</h3>
                                                        <button onClick={() => toggleWork(img.name)} className="text-xs mt-2 text-blue-600 font-bold">{isSelected ? '取消選取' : '選取'}</button>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                ) : (
                                    <div className="py-20 text-center text-slate-300 font-bold">請先驗證班級密碼</div>
                                )}
                            </div>
                        ) : (
                            <div className="bg-white rounded-2xl shadow-sm border h-[70vh] overflow-hidden">
                                <iframe src={CONFIG.GOOGLE_RESULTS_URL} className="w-full h-full border-0"></iframe>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        // 初始化圖示
        setTimeout(() => lucide.createIcons(), 500);
    </script>
</body>
</html>
